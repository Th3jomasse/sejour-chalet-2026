<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planif Repas — ChaletMylène</title>
<style>
  :root {
    --emerald: #059669; --emerald-dark: #047857; --emerald-light: #d1fae5;
    --bg: #f8faf9; --card: #ffffff; --text: #1f2937; --muted: #6b7280;
    --border: #e5e7eb; --boucherie: #dc2626; --saq: #7c3aed; --epicerie: #059669;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; padding: 0 0 60px; }
  header { background: linear-gradient(135deg, var(--emerald), var(--emerald-dark));
    color: #fff; padding: 20px 16px; text-align: center; }
  header h1 { font-size: 1.35rem; margin-bottom: 4px; }
  header p { font-size: 0.85rem; opacity: 0.9; }
  .container { max-width: 640px; margin: 0 auto; padding: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; margin-bottom: 16px; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: var(--emerald-dark); }
  label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--muted); }
  input[type="text"], input[type="number"], textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px;
    font-size: 0.95rem; font-family: inherit; margin-bottom: 12px; }
  textarea { min-height: 60px; resize: vertical; }
  .row { display: flex; gap: 10px; } .row > div { flex: 1; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .chip { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 20px;
    background: #fff; font-size: 0.85rem; cursor: pointer; user-select: none; transition: all 0.15s; }
  .chip.active { background: var(--emerald); color: #fff; border-color: var(--emerald); }
  .slider-group { margin-bottom: 16px; }
  .slider-group .labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }
  input[type="range"] { width: 100%; accent-color: var(--emerald); }
  button.primary { width: 100%; padding: 14px; background: var(--emerald); color: #fff; border: none;
    border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary { width: 100%; padding: 12px; background: #fff; color: var(--emerald-dark);
    border: 1.5px solid var(--emerald); border-radius: 12px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; margin-top: 10px; }
  .hidden { display: none; }
  .meal-day { margin-bottom: 16px; }
  .meal-day h3 { font-size: 0.95rem; color: var(--emerald-dark); border-bottom: 2px solid var(--emerald-light);
    padding-bottom: 4px; margin-bottom: 8px; }
  .meal { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .meal:last-child { border-bottom: none; }
  .meal .type { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; }
  .meal .titre { font-weight: 600; font-size: 0.95rem; }
  .meal .desc { font-size: 0.85rem; color: var(--muted); }
  .votes { display: flex; gap: 8px; margin-top: 6px; }
  .vote-btn { border: 1.5px solid var(--border); background: #fff; border-radius: 16px; padding: 3px 12px;
    font-size: 0.85rem; cursor: pointer; }
  .vote-btn.up.mine { background: var(--emerald-light); border-color: var(--emerald); }
  .vote-btn.down.mine { background: #fee2e2; border-color: var(--boucherie); }
  .store-header { display: flex; align-items: center; gap: 8px; margin: 14px 0 10px; }
  .store-badge { width: 10px; height: 10px; border-radius: 50%; }
  .list-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 0.92rem; }
  .list-item input { width: 18px; height: 18px; accent-color: var(--emerald); flex-shrink: 0; }
  .list-item.checked span { text-decoration: line-through; color: var(--muted); }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: #fef2f2; color: #b91c1c; padding: 12px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 12px; }
  .status { font-size: 0.75rem; color: var(--muted); text-align: center; margin-bottom: 12px; }
</style>
</head>
<body>
<header>
  <h1>🍽️ Planif Repas — ChaletMylène</h1>
  <p>Vos envies → le plan, partagé en temps réel</p>
</header>

<div class="container">
  <div class="status" id="status">Connexion…</div>

  <div class="card">
    <h2>Le séjour</h2>
    <div class="row">
      <div><label>Personnes</label><input type="number" id="nbPersonnes" value="4" min="1" max="20"></div>
      <div><label>Jours</label><input type="number" id="nbJours" value="3" min="1" max="14"></div>
    </div>
    <label>Participants</label>
    <input type="text" id="participants" value="Mathilde, Miguel, Mylène, Jonathan">
    <label>Contexte (activités, contraintes, allergies…)</label>
    <textarea id="contexte" placeholder="Ex. : arrivée vendredi 10h, départ dimanche 15h, BBQ dispo, sortie bateau samedi"></textarea>
  </div>

  <div class="card">
    <h2>Vos envies du moment 🎯</h2>
    <div class="chips" id="envies">
      <span class="chip" data-v="🔥 BBQ / grillades">🔥 BBQ</span>
      <span class="chip" data-v="🥗 Santé / léger">🥗 Léger</span>
      <span class="chip" data-v="🍝 Réconfortant">🍝 Réconfortant</span>
      <span class="chip" data-v="🌶️ Épicé">🌶️ Épicé</span>
      <span class="chip" data-v="🐟 Poisson / fruits de mer">🐟 Mer</span>
      <span class="chip" data-v="🍔 Comfort food">🍔 Comfort</span>
      <span class="chip" data-v="🌱 Végé">🌱 Végé</span>
      <span class="chip" data-v="⏱️ Rapide / facile">⏱️ Facile</span>
      <span class="chip" data-v="🍷 Apéro / grignotage">🍷 Apéro</span>
    </div>
    <div class="slider-group"><label>Budget</label>
      <input type="range" id="budget" min="1" max="3" value="2">
      <div class="labels"><span>Économique</span><span>Équilibré</span><span>Gastronomie</span></div></div>
    <div class="slider-group"><label>Effort en cuisine</label>
      <input type="range" id="effort" min="1" max="3" value="2">
      <div class="labels"><span>Minimal</span><span>Normal</span><span>On cuisine</span></div></div>
  </div>

  <div id="errorBox"></div>
  <button class="primary" id="generateBtn" disabled>✨ Générer le plan</button>

  <div id="results" style="margin-top:20px;"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-functions.js";

  // La config Firebase est chargée automatiquement depuis Firebase Hosting
  // (/__/firebase/init.json) — rien à coller à la main.
  let auth, db, generatePlan, sejourRef;

  const $ = (id) => document.getElementById(id);
  let uid = null;
  let currentData = null;

  document.querySelectorAll("#envies .chip").forEach(chip =>
    chip.addEventListener("click", () => chip.classList.toggle("active")));

  const budgetLabels = { "1": "économique", "2": "équilibré", "3": "gastronomie" };
  const effortLabels = { "1": "minimal (peu de cuisine)", "2": "normal", "3": "on aime cuisiner" };

  async function boot() {
    let cfg;
    try {
      const r = await fetch("/__/firebase/init.json");
      if (!r.ok) throw new Error("init.json " + r.status);
      cfg = await r.json();
    } catch (e) {
      $("status").textContent = "";
      setError("Config Firebase introuvable. Sers l'app via Firebase Hosting (après « firebase deploy ») ou en local avec « firebase serve ».");
      return;
    }
    const app = initializeApp(cfg);
    auth = getAuth(app);
    db = getFirestore(app);
    generatePlan = httpsCallable(getFunctions(app, "us-central1"), "generatePlan");
    sejourRef = doc(db, "sejours", "chalet");

    signInAnonymously(auth).catch(e => setError("Auth échouée : " + e.message));
    onAuthStateChanged(auth, (user) => {
      if (!user) return;
      uid = user.uid;
      $("status").textContent = "Connecté · synchronisé en temps réel";
      $("generateBtn").disabled = false;
      onSnapshot(sejourRef, (snap) => {
        currentData = snap.exists() ? snap.data() : null;
        render();
      }, (e) => setError("Sync : " + e.message));
    });
  }
  boot();

  function collectParams(feedback) {
    return {
      nbPersonnes: $("nbPersonnes").value,
      nbJours: $("nbJours").value,
      participants: $("participants").value.trim(),
      contexte: $("contexte").value.trim(),
      envies: [...document.querySelectorAll("#envies .chip.active")].map(c => c.dataset.v),
      budget: budgetLabels[$("budget").value],
      effort: effortLabels[$("effort").value],
      feedback: feedback || ""
    };
  }

  async function generate(feedback) {
    setError("");
    const btn = $("generateBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Génération…';
    try {
      const res = await generatePlan(collectParams(feedback));
      const plan = res.data.plan;
      await setDoc(sejourRef, {
        plan, checks: {}, votes: {},
        params: collectParams(feedback),
        generatedAt: serverTimestamp()
      });
    } catch (err) {
      setError(err.message || String(err));
    } finally {
      btn.disabled = false;
      btn.innerHTML = "✨ Générer le plan";
    }
  }

  async function toggleCheck(id, checked) {
    try { await updateDoc(sejourRef, { ["checks." + id]: checked }); } catch (e) { setError(e.message); }
  }
  async function vote(idx, dir) {
    const current = currentData?.votes?.[idx]?.[uid];
    const val = current === dir ? null : dir; // re-cliquer = annuler son vote
    try { await updateDoc(sejourRef, { ["votes." + idx + "." + uid]: val }); } catch (e) { setError(e.message); }
  }

  function voteCounts(idx) {
    const v = currentData?.votes?.[idx] || {};
    let up = 0, down = 0;
    for (const k in v) { if (v[k] === "up") up++; else if (v[k] === "down") down++; }
    return { up, down, mine: v[uid] || null };
  }

  function render() {
    const r = $("results");
    if (!currentData || !currentData.plan) { r.innerHTML = ""; return; }
    const plan = currentData.plan;
    const checks = currentData.checks || {};

    const byDay = {};
    (plan.repas || []).forEach((m, i) => { (byDay[m.jour] = byDay[m.jour] || []).push({ m, i }); });

    let html = '<div class="card"><h2>🍽️ Plan des repas</h2>';
    for (const jour of Object.keys(byDay)) {
      html += '<div class="meal-day"><h3>' + esc(jour) + '</h3>';
      byDay[jour].forEach(({ m, i }) => {
        const c = voteCounts(i);
        html += '<div class="meal"><div class="type">' + esc(m.type_repas) + '</div>' +
          '<div class="titre">' + esc(m.titre) + '</div>' +
          '<div class="desc">' + esc(m.description) + '</div>' +
          '<div class="votes">' +
            '<button class="vote-btn up' + (c.mine === "up" ? " mine" : "") + '" data-vote="up" data-idx="' + i + '">👍 ' + c.up + '</button>' +
            '<button class="vote-btn down' + (c.mine === "down" ? " mine" : "") + '" data-vote="down" data-idx="' + i + '">👎 ' + c.down + '</button>' +
          '</div></div>';
      });
      html += '</div>';
    }
    html += '</div>';

    const stores = [
      { key: "boucherie", label: "🥩 Boucherie", color: "var(--boucherie)" },
      { key: "saq", label: "🍷 SAQ", color: "var(--saq)" },
      { key: "epicerie", label: "🛍️ Épicerie", color: "var(--epicerie)" }
    ];
    html += '<div class="card"><h2>🛒 Listes d\'achats</h2>';
    stores.forEach(s => {
      const items = (plan.listes && plan.listes[s.key]) || [];
      if (!items.length) return;
      html += '<div class="store-header"><span class="store-badge" style="background:' + s.color + '"></span><strong>' + s.label + '</strong></div>';
      items.forEach((item, i) => {
        const id = s.key + i;
        const on = !!checks[id];
        html += '<label class="list-item' + (on ? " checked" : "") + '"><input type="checkbox" data-check="' + id + '"' + (on ? " checked" : "") + '><span>' + esc(item) + '</span></label>';
      });
    });
    html += '</div>';

    html += '<button class="secondary" id="regenBtn">🔄 Régénérer en tenant compte des votes</button>';
    r.innerHTML = html;

    r.querySelectorAll("[data-check]").forEach(cb =>
      cb.addEventListener("change", () => toggleCheck(cb.dataset.check, cb.checked)));
    r.querySelectorAll("[data-vote]").forEach(b =>
      b.addEventListener("click", () => vote(parseInt(b.dataset.idx, 10), b.dataset.vote)));
    $("regenBtn").addEventListener("click", regenerateFromVotes);
  }

  function regenerateFromVotes() {
    const plan = currentData?.plan;
    if (!plan) return;
    const disliked = (plan.repas || []).filter((m, i) => {
      const c = voteCounts(i); return c.down > c.up;
    }).map(m => m.titre);
    const liked = (plan.repas || []).filter((m, i) => {
      const c = voteCounts(i); return c.up > c.down;
    }).map(m => m.titre);
    let fb = "";
    if (disliked.length) fb += "Remplace ces repas mal notés par des alternatives : " + disliked.join(", ") + ". ";
    if (liked.length) fb += "Garde l'esprit de ces repas appréciés : " + liked.join(", ") + ".";
    generate(fb || "Propose une nouvelle variante du plan.");
  }

  function setError(msg) { $("errorBox").innerHTML = msg ? '<div class="error">' + esc(msg) + '</div>' : ""; }
  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }

  $("generateBtn").addEventListener("click", () => generate());
</script>
</body>
</html>
